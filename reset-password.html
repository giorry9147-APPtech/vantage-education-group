<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw wachtwoord - Vantage Education Group</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <header class="topbar">
    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="Vantage Education Group logo" class="logo" />
    </a>

    <div class="topbar-right">
      <a href="login.html" class="top-login-btn">
        <span>←</span>
        <span>Terug naar login</span>
      </a>
    </div>
  </header>

  <main class="login-hero">
    <div class="login-hero-bg"></div>

    <div class="container login-layout">
      <div class="login-left">
        <span class="role-badge">Beveiliging</span>
        <h1>Nieuw wachtwoord instellen</h1>
        <p>
          Kies een nieuw wachtwoord voor je account. Daarna kun je opnieuw inloggen.
        </p>
      </div>

      <div class="login-right">
        <div class="auth-card">
          <form id="resetPasswordForm" class="auth-form">
            <div class="form-group">
              <label for="newPassword">Nieuw wachtwoord</label>
              <input
                type="password"
                id="newPassword"
                name="newPassword"
                placeholder="Minimaal 6 tekens"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword">Herhaal nieuw wachtwoord</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Herhaal je wachtwoord"
                required
              />
            </div>

            <button type="submit" class="submit-btn" id="resetSubmitBtn">
              <span id="resetSubmitBtnText">Wachtwoord opslaan</span>
            </button>

            <p class="form-message" id="resetFormMessage"></p>
          </form>

          <div class="back-links">
            <a href="login.html">← Terug naar login</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
